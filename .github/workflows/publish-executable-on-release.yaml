name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: winsocat-windows-x86_64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: winsocat-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: winsocat-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: winsocat-macos-aarch64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --package winsocat --target ${{ matrix.target }}

      - name: Package (Windows)
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }} winsocat.exe

      - name: Package (Unix)
        if: "!contains(matrix.target, 'windows')"
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }} winsocat

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
